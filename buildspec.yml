version: 0.2

env:
  shell: bash
  variables:
    IMAGE_TAG_PREFIX: event-management-service
    DEPLOY_TO_ECS: "false"

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - set -euo pipefail
      - chmod +x ./mvnw
      - aws --version
      - docker --version
  pre_build:
    commands:
      - ': "${AWS_DEFAULT_REGION:?AWS_DEFAULT_REGION must be set in CodeBuild}"'
      - ': "${ECR_REPOSITORY:?ECR_REPOSITORY must be set, for example ticketmaster/event-management-service}"'
      - AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID:-$(aws sts get-caller-identity --query Account --output text)}"
      - ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
      - COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-local}"
      - SHORT_SHA="${COMMIT_SHA:0:7}"
      - IMAGE_TAG="${IMAGE_TAG:-${IMAGE_TAG_PREFIX}-${SHORT_SHA}}"
      - aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null
      - aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
  build:
    commands:
      - ./mvnw -B clean verify
      - docker build --build-arg JAR_FILE=target/*.jar -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
  post_build:
    commands:
      - docker push "${IMAGE_URI}:${IMAGE_TAG}"
      - docker push "${IMAGE_URI}:latest"
      - printf '[{"name":"%s","imageUri":"%s"}]' "${CONTAINER_NAME:-event-management-service}" "${IMAGE_URI}:${IMAGE_TAG}" > imagedefinitions.json
      - |
        if [ "${DEPLOY_TO_ECS}" = "true" ]; then
          : "${ECS_CLUSTER:?ECS_CLUSTER must be set when DEPLOY_TO_ECS=true}"
          : "${ECS_SERVICE:?ECS_SERVICE must be set when DEPLOY_TO_ECS=true}"
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment
        fi

artifacts:
  files:
    - imagedefinitions.json
    - target/*.jar
  discard-paths: yes
